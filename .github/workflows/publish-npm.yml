name: Publish NPM

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Check formatting
        run: deno fmt --check

      - name: Lint
        run: deno lint

      - name: Run unit and integration tests
        run: deno task test

      - name: Resolve package version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if [ -z "$VERSION" ]; then
            echo "Unable to determine package version" >&2
            exit 1
          fi

          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check npm version availability
        id: npm_version
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          if npm view "bulk-ts-sdk@${VERSION}" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} already exists on npm. Skipping publish."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build npm package
        if: steps.npm_version.outputs.should_publish == 'true'
        run: deno task build:npm ${{ steps.version.outputs.value }}

      - name: Setup Node.js
        if: steps.npm_version.outputs.should_publish == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          registry-url: "https://registry.npmjs.org"

      - name: Publish to npm
        if: steps.npm_version.outputs.should_publish == 'true'
        working-directory: npm
        run: npm publish --provenance --access public
