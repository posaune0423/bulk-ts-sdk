        "500":
          $ref: "#/components/responses/ServerError"

components:
  # ===================================================================
  # PARAMETERS
  # ===================================================================
  parameters:
    SymbolPath:
      name: symbol
      in: path
      required: true
      description: Market symbol
      schema:
        type: string
        example: BTC-USD

    SymbolQuery:
      name: symbol
      in: query
      required: true
      description: Market symbol
      schema:
        type: string
        example: BTC-USD

    Interval:
      name: interval
      in: query
      required: true
      description: Candle timeframe
      schema:
        type: string
        enum: [10s, 1m, 3m, 5m, 15m, 30m, 1h, 2h, 4h, 6h, 8h, 12h, 1d, 3d, 1w, 1M]
        example: 1m

    StartTime:
      name: startTime
      in: query
      required: false
      description: Start timestamp (milliseconds)
      schema:
        type: integer
        format: int64

    EndTime:
      name: endTime
      in: query
      required: false
      description: End timestamp (milliseconds)
      schema:
        type: integer
        format: int64

  # ===================================================================
  # RESPONSES
  # ===================================================================

  responses:
    BadRequest:
      description: Bad Request - Invalid parameters or transaction type

    NotFound:
      description: Not Found - Symbol or account doesn't exist

    Timeout:
      description: Request Timeout - Executor didn't respond within 2s

    ServerError:
      description: Internal Server Error - Database or channel error

  # ===================================================================
  # SCHEMAS
  # ===================================================================

  schemas:
    # Market Data Schemas
    MarketInfo:
      type: object
      description: Market configuration and trading rules
      properties:
        symbol:
          type: string
          example: BTC-USD
        baseAsset:
          type: string
          description: Base currency
          example: BTC
        quoteAsset:
          type: string
          description: Quote currency
          example: USDC
        status:
          type: string
          enum: [TRADING, SUSPENDED, CLOSED]
        pricePrecision:
          type: integer
          description: Decimal places for price
        sizePrecision:
          type: integer
          description: Decimal places for size
        tickSize:
          type: number
          description: Minimum price increment
        lotSize:
          type: number
          description: Minimum order size
        minNotional:
          type: number
          description: Minimum order value (price × size)
        maxLeverage:
          type: integer
          description: Maximum allowed leverage
        orderTypes:
          type: array
          items:
            type: string
            enum: [LIMIT, MARKET, STOP, STOP_LIMIT, TAKE_PROFIT, RANGE, TRIGGER, TRAILING]
          description: Supported order types for this market.
        timeInForces:
          type: array
          items:
            type: string

    MarketStats:
      type: object
      description: 24-hour market statistics
      properties:
        symbol:
          type: string
        priceChange:
          type: number
          description: Absolute price change (24h)
        priceChangePercent:
          type: number
          description: Percentage price change (24h)
        lastPrice:
          type: number
          description: Last traded price
        highPrice:
          type: number
          description: 24h high
        lowPrice:
          type: number
          description: 24h low
        volume:
          type: number
          description: 24h volume (base currency)
        quoteVolume:
          type: number
          description: 24h volume (quote currency)
        markPrice:
          type: number
          description: Fair value price (for margin calculations)
        oraclePrice:
          type: number
          description: External reference price
        openInterest:
          type: number
          description: Total open positions (base currency)
        fundingRate:
          type: number
          description: Current funding rate
        regime:
          type: integer
          description: Market regime indicator (-1, 0, 1)
        regimeDt:
          type: integer
          description: Regime duration in 10s intervals
        regimeVol:
          type: number
          description: Regime-adjusted volatility
        regimeMv:
          type: number
          description: Regime mean value
        fairBookPx:
          type: number
          description: Fair price derived from order book
        fairVol:
          type: number
          description: Fair volatility estimate
        fairBias:
          type: number
          description: Fair price bias
        timestamp:
          type: integer
          format: int64
          description: Timestamp (nanoseconds)

    RiskPoint:
      type: object
      description: Risk point at a specific notional/leverage grid coordinate
      properties:
        mmrO:
          type: number
          description: Start-of-regime maintenance margin ratio
        mmrE:
          type: number
          description: End-of-regime maintenance margin ratio
        p:
          type: number
          description: Probability of remaining in regime

    RiskSurface:
      type: object
      description: Risk surface for one regime
      properties:
        regime:
          type: integer
          description: Regime index
        leverage:
          type: array
          items:
            type: number
          description: Leverage knot points
        notionals:
          type: array
          items:
            type: number
          description: Notional knot points
        buy:
          type: array
          description: 2D buy-side grid [notional_idx][leverage_idx]
          items:
            type: array
            items:
              $ref: "#/components/schemas/RiskPoint"
        sell:
          type: array
          description: 2D sell-side grid [notional_idx][leverage_idx]
          items:
            type: array
            items:
              $ref: "#/components/schemas/RiskPoint"

    RiskSurfaces:
      type: object
      description: Complete risk surfaces for a market across all regimes
      properties:
        symbol:
          type: string
          description: Market symbol
          example: BTC-USD
        liveRegime:
          type: integer
          description: Currently active regime index
        surfaces:
          type: array
          description: Regime surfaces sorted by regime ascending
          items:
            $ref: "#/components/schemas/RiskSurface"
        corrs:
          type: array
          description: Correlation tuples [pair, rho]
          items:
            type: array
            minItems: 2
            maxItems: 2
            items:
              oneOf:
                - type: string
                - type: number

    ExchangeStats:
      type: object
      description: Aggregate exchange statistics
      properties:
        timestamp:
          type: integer
          format: int64
          description: Server timestamp (milliseconds)
        period:
          type: string
          description: Requested period
          example: "1d"
        volume:
          type: object
          properties:
            totalUsd:
              type: number
              description: Total volume in USD
        openInterest:
          type: object
          properties:
            totalUsd:
              type: number
              description: Sum of per-market open interest converted to USD using mark prices
        funding:
          type: object
          properties:
            rates:
              type: object
              description: Funding rates by market symbol
              additionalProperties:
                type: object
                properties:
                  current:
                    type: number
                    description: Current 8-hour funding rate
                  annualized:
                    type: number
                    description: Annualized funding rate
        markets:
          type: array
          description: Per-market breakdown (sorted by quoteVolume desc)
          items:
            type: object
            properties:
              symbol:
                type: string
              volume:
                type: number
                description: 24h volume in base currency
              quoteVolume:
                type: number
                description: 24h volume in USD
              openInterest:
                type: number
                description: Open interest in native market units (base/contracts)
              fundingRate:
                type: number
                description: Current 8-hour funding rate
              fundingRateAnnualized:
                type: number
                description: Annualized funding rate
              lastPrice:
                type: number
              markPrice:
                type: number

    Candle:
      type: object
      description: OHLCV candlestick data
      required: [t, T, o, h, l, c, v, n]
      properties:
        t:
          type: integer
          format: int64
          description: Open timestamp (ms)
        T:
          type: integer
          format: int64
          description: Close timestamp (ms)
        o:
          type: number
          description: Open price
        h:
          type: number
          description: High price
        l:
          type: number
          description: Low price
        c:
          type: number
          description: Close price
        v:
          type: number
          description: Volume
        n:
          type: integer
          description: Number of trades

    BookUpdate:
      type: object
      description: Order book snapshot or delta
      properties:
        updateType:
          type: string
          enum: [snapshot, delta]
          description: |
            - `snapshot`: Full order book state (both sides populated)
            - `delta`: Incremental update (only one side has levels, other is empty array)
        symbol:
          type: string
          description: Market symbol
        levels:
          type: array
          description: |
            Array with exactly 2 elements: `[bids, asks]`
            - Index 0: Bid levels (highest to lowest price)
            - Index 1: Ask levels (lowest to highest price)
            - For deltas: Only one side will have levels, the other will be an empty array `[]`
          minItems: 2
          maxItems: 2
          items:
            type: array
            items:
              $ref: "#/components/schemas/Level"
        timestamp:
          type: integer
          format: int64
          description: Timestamp in milliseconds

    Level:
      type: object
      description: Price level in order book
      properties:
        px:
          type: number
          description: Price level
        sz:
          type: number
          description: Total size at this price level
        n:
          type: integer
          description: |
            Number of orders at this price level.
            - For snapshots: Actual count of orders
            - For deltas: Always `0` (order count not tracked in deltas)

    # Account Schemas (Unsigned)

    AccountQuery:
      type: object
      description: Account query parameters (no signature needed)
      required:
        - type
