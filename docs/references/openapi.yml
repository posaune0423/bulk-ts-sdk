openapi: 3.0.3
info:
  title: Bulk Trade API
  description: |
    # BULK TRADE (HTTP & WebSocket) API

    One Exchange Infinite Markets.

    ## API Structure

    This API is divided into three main sections:

    ### 1. Market Data Endpoints (Public, Read-only)
    - Exchange information and symbols
    - Market statistics and tickers
    - Historical candles (OHLCV)
    - Order book snapshots
    - **HTTP**: REST endpoints for queries
    - **WebSocket**: Real-time streams for live data

    ### 2. Account Endpoints (Public, Unsigned)
    - Query account state (positions, orders, margin)
    - Query fill history
    - **No signature required** - read-only operations
    - Does not mutate state

    ### 3. Transaction Endpoint (Signed, State-Mutating)
    - Single `POST /order` endpoint for all operations
    - Place orders (limit, market), cancel, faucet, settings, agent wallets
    - Unified `Transaction` model with `actions` array
    - **Signature required** - Ed25519 signature of transaction
    - Mutates account state

    ## Base URLs

    - **HTTP REST**: `https://exchange-api.bulk.trade/api/v1`
    - **WebSocket**: `wss://exchange-ws1.bulk.trade`

    ## Glossary

    ### Field Notation

    Bulk uses compact field names to minimize bandwidth (critical for HFT):

    | Short | Full Name | Description |
    |-------|-----------|-------------|
    | `s` | symbol | Market symbol (e.g., BTC-USD) |
    | `c` | coin | Market symbol in orders / cancel |
    | `px` | price | Price level |
    | `sz` | size | Order/position size |
    | `b` | is_buy | Buy/sell direction (true=buy, false=sell) |
    | `r` | reduce_only | Order only reduces position |
    | `tif` | time_in_force | Order lifetime (GTC/IOC/ALO) |
    | `o` | open | Open price (candles) |
    | `h` | high | High price (candles) |
    | `l` | low | Low price (candles) |
    | `v` | volume | Trading volume |
    | `n` | count | Number of trades/orders |
    | `T` | close_time | Close timestamp |
    | `oid` | order_id | Order identifier (base58) |
    | `u` | user | User public key |
    | `a` | agent | Agent public key |
    | `d` | delete | Delete flag |
    | `m` | max_leverage | Leverage settings map |
    | `reason` | reason | Fill reason (normal/liquidation/adl) |

    ### Order Types

    | Action Type | TIF | Description | Use Case |
    |-------------|-----|-------------|----------|
    | `l` | **GTC** | Good Till Cancel | Standard limit order, rests on book |
    | `l` | **IOC** | Immediate or Cancel | Fill or kill (aggressive price) |
    | `l` | **ALO** | Add Liquidity Only | Maker-only (post-only) |
    | `m` | N/A | Market Order | Immediate execution at best price |

    ### Market Terminology

    - **Perpetual**: Perpetual futures contract (no expiry)
    - **Mark Price**: Fair value price (used for margin calculations)
    - **Oracle Price**: External reference price
    - **Open Interest**: Total notional value of open positions
    - **Funding Rate**: Periodic payment between longs and shorts
    - **Maker**: Liquidity provider (resting order)
    - **Taker**: Liquidity consumer (aggressive order)
    - **Tick Size**: Minimum price increment
    - **Lot Size**: Minimum order size

    ### Timestamp Formats

    - **HTTP API**: Milliseconds since Unix epoch (int64)
    - **WebSocket**: Milliseconds since Unix epoch (int64)
    - **Internal**: Nanoseconds (converted at API boundary)

  version: 3.0.10
  contact:
    name: Junbug
    url: https://x.com/junbug_sol
  license:
    name: Custom
    url: https://www.custom.com/license

servers:
  - url: https://exchange-api.bulk.trade/api/v1
    description: Production

tags:
  - name: Market Data
    description: |
      **Public, read-only endpoints**

      Real-time and historical market data. No authentication required.

      **HTTP**: Query historical data
      **WebSocket**: Subscribe to real-time updates

  - name: Account (Unsigned)
    description: |
      **Public, read-only, no signature required**

      Query account information. Does not mutate state.
      Anyone can query any account's public data.

  - name: Trading (Signed)
    description: |
      **Authenticated, state-mutating endpoints**

      Place and cancel orders. Requires Ed25519 signature.
      See "Transaction Signing" section for details.

x-tagGroups:
  - name: Public (Read-only)
    tags:
      - Market Data
      - Account (Unsigned)
  - name: Authenticated (Write)
    tags:
      - Trading (Signed)

paths:
  /metrics:
    get:
      tags:
        - Market Data
      summary: Get runtime metrics snapshot
      description: |
        Returns current runtime metrics as JSON.

        If metrics callback wiring is disabled, returns:
        `{ "error": "metrics not configured" }`.

        When validator metrics callback is enabled, payload includes ingress authentication counters
        under `wire_auth`, including:
        - `tx_auth_bad_signature`
        - `tx_auth_unauthorized_signer`
      operationId: getMetrics
      responses:
        "200":
          description: Metrics payload
          content:
            application/json:
              schema:
                type: object

  /verify:
    get:
      tags:
        - Market Data
      summary: Verify ledger and committed metrics consistency
      description: |
        Returns ledger verification values (`tx_count`, `tx_xor`, `latest_round`)
        and compares them with committed metrics values when available.
      operationId: getVerify
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ledger:
                    type: object
                    properties:
                      tx_count:
                        type: integer
                      tx_xor:
                        type: string
                      latest_round:
                        type: integer
                        nullable: true
                  metrics:
                    type: object
                    properties:
                      committed_count:
                        type: integer
                      committed_xor:
                        type: string
                  match:
                    type: boolean
        "500":
          $ref: "#/components/responses/ServerError"

  # ===================================================================
  # MARKET DATA ENDPOINTS (HTTP)
  # ===================================================================

  /exchangeInfo:
    get:
      tags:
        - Market Data
      summary: Get exchange info
      description: |
        Returns information about all available markets.
      operationId: getExchangeInfo
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketInfo"
              example:
                - symbol: BTC-USD
                  baseAsset: BTC
                  quoteAsset: USDC
                  status: TRADING
                  pricePrecision: 1
                  sizePrecision: 8
                  tickSize: 0.5
                  lotSize: 0.001
                  minNotional: 10.0
                  maxLeverage: 10
                  orderTypes: [LIMIT, MARKET, STOP, TAKE_PROFIT, RANGE, TRIGGER, TRAILING]
                  timeInForces: [GTC, IOC]
        "500":
          description: Internal server error

  /ticker/{symbol}:
    get:
      tags:
        - Market Data
      summary: Get market statistics
      description: |
        Returns 24-hour statistics for a specific symbol.
      operationId: getTicker
      parameters:
        - $ref: "#/components/parameters/SymbolPath"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketStats"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /klines:
    get:
      tags:
        - Market Data
      summary: Get candle history (OHLCV)
      description: |
        Returns historical candlestick data for charting.

        **Supported intervals**: 10s, 1m, 3m, 5m, 15m, 30m, 1h, 2h, 4h, 6h, 8h, 12h, 1d, 3d, 1w, 1M
      operationId: getKlines
      parameters:
        - $ref: "#/components/parameters/SymbolQuery"
        - $ref: "#/components/parameters/Interval"
        - $ref: "#/components/parameters/StartTime"
        - $ref: "#/components/parameters/EndTime"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Candle"
        "500":
          $ref: "#/components/responses/ServerError"

  /l2book:
    get:
      tags:
        - Market Data
      summary: Get L2 order book
      description: |
        Returns current order book snapshot with optional filtering.
      operationId: getL2Book
      parameters:
        - name: type
          in: query
          required: true
          description: Must be "l2book"
          schema:
            type: string
            enum: [l2book]
        - name: coin
          in: query
          required: true
          description: Market symbol
          schema:
            type: string
            example: BTC-USD
        - name: nlevels
          in: query
          required: false
          description: Number of price levels to return per side
          schema:
            type: integer
            example: 10
        - name: aggregation
          in: query
          required: false
          description: Price increment for aggregation (in quote currency)
          schema:
            type: number
            format: double
            example: 0.5
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookUpdate"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /stats:
    get:
      tags:
        - Market Data
      summary: Get exchange statistics
      description: |
        Returns exchange statistics with optional symbol filtering.

        **Notes**:
        - All periods currently return 24h rolling stats
        - Aggregate queries (`symbol` omitted) are cached with 600s TTL
        - Symbol-specific queries bypass cache
        - Markets array sorted by quoteVolume descending
        - Period aliases accepted by server:
          - `24h` -> `1d`
          - `1w` -> `7d`
          - `1m` -> `30d`
          - `3m` -> `90d`
          - `365d` -> `1y`
      operationId: getExchangeStats
      parameters:
        - name: period
          in: query
          required: false
          description: |
            Canonical period value.
            If omitted or invalid, defaults to `1d`.
          schema:
            type: string
            enum: [1d, 7d, 30d, 90d, 1y, all]
            default: 1d
          examples:
            default:
              value: 1d
            weekly:
              value: 7d
        - name: symbol
          in: query
          required: false
          description: Optional symbol filter (e.g. BTC-USD)
          schema:
            type: string
            example: BTC-USD
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeStats"
              examples:
                aggregate:
                  summary: Aggregate stats across all markets
                  value:
                    timestamp: 1704067200000
                    period: 1d
                    volume:
                      totalUsd: 126543210.0
                    openInterest:
                      totalUsd: 54321000.0
                    funding:
                      rates:
                        BTC-USD:
                          current: 0.0001
                          annualized: 0.1095
                        ETH-USD:
                          current: 0.00008
                          annualized: 0.0876
                    markets:
                      - symbol: BTC-USD
                        volume: 1234.56
                        quoteVolume: 126543210.0
                        openInterest: 487.8
                        fundingRate: 0.0001
                        fundingRateAnnualized: 0.1095
                        lastPrice: 102500.0
                        markPrice: 102480.0
                symbolFiltered:
                  summary: Symbol-filtered stats
                  value:
                    timestamp: 1704067200000
                    period: 7d
                    volume:
                      totalUsd: 126543210.0
                    openInterest:
                      totalUsd: 50000000.0
                    funding:
                      rates:
                        BTC-USD:
                          current: 0.0001
                          annualized: 0.1095
                    markets:
                      - symbol: BTC-USD
                        volume: 1234.56
                        quoteVolume: 126543210.0
                        openInterest: 487.8
                        fundingRate: 0.0001
                        fundingRateAnnualized: 0.1095
                        lastPrice: 102500.0
                        markPrice: 102480.0
                unknownSymbol:
                  summary: Unknown symbol still returns 200 with empty/zero stats
                  value:
                    timestamp: 1704067200000
                    period: 1d
                    volume:
                      totalUsd: 0.0
                    openInterest:
                      totalUsd: 0.0
                    funding:
                      rates: {}
                    markets: []
        "500":
          $ref: "#/components/responses/ServerError"

  /riskSurfaces:
    get:
      tags:
        - Market Data
      summary: Get all regime risk surfaces for a market
      description: |
        Returns the complete risk configuration surface set for one market across all regimes.
        This is a read-only snapshot endpoint and does not mutate state.
      operationId: getRiskSurfaces
      parameters:
        - name: market
          in: query
          required: true
          description: Market symbol or coin symbol (for example `BTC-USD` or `BTC`)
          schema:
            type: string
            example: BTC-USD
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskSurfaces"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "408":
          $ref: "#/components/responses/Timeout"
        "500":
          $ref: "#/components/responses/ServerError"

  # ===================================================================
  # ACCOUNT ENDPOINTS (UNSIGNED - Read-only)
  # ===================================================================

  /account:
    post:
      tags:
        - Account (Unsigned)
      summary: Query account (unsigned)
      description: |
        Query account information. **No signature required** - read-only operation.

        Accepts a JSON body with POST request.

        **Query types**:
        - `fullAccount`: Complete state (margin + positions + orders + leverage settings)
        - `openOrders`: Resting live orders (includes conditional orders parked in conditional books)
        - `fills`: Trade history (last 5000 fills)
        - `positions`: Closed position history (last 5000 positions)
        - `fundingHistory`: Funding payment history (last 5000 payments)
        - `orderHistory`: Terminal order history (last 5000 orders)
        - `feeTier`: Account fee-tier quote + fee policy snapshot (`symbol` optional)
      operationId: getAccount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountQuery"
            examples:
              fullAccount:
                summary: Get full account state
                value:
                  type: fullAccount
                  user: "FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7"
              openOrders:
                summary: Get open orders only
                value:
                  type: openOrders
                  user: "FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7"
              fills:
                summary: Get fill history
                value:
                  type: fills
                  user: "FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7"
              positions:
                summary: Get closed position history
                value:
                  type: positions
                  user: "FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7"
              fundingHistory:
                summary: Get funding payment history
                value:
                  type: fundingHistory
                  user: "FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7"
              orderHistory:
                summary: Get terminal order history
                value:
                  type: orderHistory
                  user: "FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7"
              feeTier:
                summary: Get account fee tier quote
                value:
                  type: feeTier
                  user: "FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7"
                  symbol: "BTC-USD"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountData"
        "404":
          $ref: "#/components/responses/NotFound"
        "408":
          $ref: "#/components/responses/Timeout"
        "500":
          $ref: "#/components/responses/ServerError"

  /feeState:
    get:
      tags:
        - Account (Unsigned)
      summary: Query protocol fee state (unsigned)
      description: |
        Returns active fee policy/schedule state for protocol/global scopes.
        This endpoint is read-only and unsigned.
      operationId: getProtocolFeeState
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeeState"
        "408":
          $ref: "#/components/responses/Timeout"
        "500":
          $ref: "#/components/responses/ServerError"

  /multisig/{pubkey}/proposals:
    get:
      tags:
        - Account (Unsigned)
      summary: Get multisig proposals snapshot (unsigned)
      description: |
        Returns the full proposal list for a multisig account, including pending,
        ready, executed, failed, expired, cancelled, and rejected entries.
        Proposal `status` is a compact string (`pending`, `ready`, `executed`,
        `failed`, `expired`, `cancelled`, `rejected`).
        Returns `404` when `pubkey` is not a multisig account.
      operationId: getMultisigProposals
      parameters:
        - name: pubkey
          in: path
          required: true
          description: Multisig account pubkey (base58)
          schema:
            type: string
            example: "6q8Y4f6g8tR4mQ1H2Zr3u9x7k9a4nS2Yx1g6Wm8qJ5tK"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MultisigProposalsSnapshot"
              example:
                multisig: "6q8Y4f6g8tR4mQ1H2Zr3u9x7k9a4nS2Yx1g6Wm8qJ5tK"
                proposals:
                  - proposalId: 42
                    proposer: "9J8TUdEWrrcADK913r1Cs7DdqX63VdVU88imfDzT1ypt"
                    createdAt: 1776700149433
                    executeAfter: 1776700209433
                    expiresAt: 1777304949433
                    approvals:
                      - "9J8TUdEWrrcADK913r1Cs7DdqX63VdVU88imfDzT1ypt"
                    rejections: []
                    approvalsCount: 1
                    rejectionsCount: 0
                    status: pending
                    actions:
                      - transfer:
                          k: internal
                          from: "8XJUssn2TxLhJ9XEPwA9pvtVJAtpgEEa2uRQYnKCGJmh"
                          to: "5Am6JkEHAjYG1itNWRMGpQrxvY8AaqkXCo1TZvenqVux"
                          marginSymbol: USDC
                          marginAmount: 10.0
                    error: null
        "404":
          description: Not Found - Pubkey is not a multisig account
        "500":
          $ref: "#/components/responses/ServerError"

  # ===================================================================
  # TRADE ENDPOINTS (SIGNED - State-mutating)
  # ===================================================================

  /order:
    post:
      tags:
        - Trading (Signed)
      summary: Submit transaction (signed)
      description: |
        Unified endpoint for all state-mutating operations. **Requires Ed25519 signature**.

        Uses a unified `Transaction` model with an `actions` array containing any combination of action types.

        **Action types** (each is a tagged object in the `actions` array):
        - `{"l": {...}}`: Place a resting limit order (GTC, IOC, ALO)
        - `{"m": {...}}`: Execute at market price
        - `{"mod": {...}}`: Modify an existing order
        - `{"cx": {...}}`: Cancel a specific order by ID
        - `{"cxa": {...}}`: Cancel all orders (by symbol or all)
        - `{"st": {...}}`: Place stop conditional order
        - `{"tp": {...}}`: Place take-profit conditional order
        - `{"rng": {...}}`: Place range/OCO conditional order
        - `{"trig": {...}}`: Place trigger basket order
        - `{"trl": {...}}`: Place trailing-stop conditional order
        - `{"of": {...}}`: Register on-fill consequents for a parent action in the same transaction
        - `{"faucet": {...}}`: Request testnet funds
        - `{"agentWalletCreation": {...}}`: Register/remove agent wallet
        - `{"updateUserSettings": {...}}`: Update leverage settings
        - `{"createSubAccount": {...}}`: Create a sub-account under the signing master
        - `{"removeSubAccount": {...}}`: Remove a sub-account and sweep margin back
        - `{"renameSubAccount": {...}}`: Rename an existing sub-account
        - `{"transfer": {...}}`: Transfer margin between accounts (internal/external; per-instrument isolated-account top-up)
        - `{"createMultisig": {...}}`: Create a protocol-native multisig account
        - `{"msp": {...}}` / `{"msa": {...}}` / `{"msr": {...}}` / `{"msc": {...}}` / `{"mse": {...}}` / `{"msu": {...}}`: Multisig propose / approve / reject / cancel / execute / update-policy
        - `{"whitelistFaucet": {...}}`: Whitelist account for faucet (admin)
        - `{"px": {...}}`: Submit price action (admin)
        - `{"o": {...}}`: Batch Pyth oracle prices (admin)

        **Batch example**: Cancel an existing order and place new ones:
        ```json
        {"actions": [{"cx": {"c": "BTC-USD", "oid": "..."}}, {"l": {...}}, {"l": {...}}], "nonce": ..., "account": "...", "signer": "...", "signature": "..."}
        ```

        **Signing**: See [Transaction Signing](/api-reference/signing) for complete wincode serialization and signing details.
      operationId: submitTransaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Transaction"
            examples:
              limitGTC:
                summary: GTC Limit Order
                value:
                  actions:
                    - l:
                        c: BTC-USD
                        b: true
                        px: 100000.0
                        sz: 0.1
                        tif: GTC
                        r: false
                        i: false
                  nonce: 1704067200000
                  account: "FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7"
                  signer: "FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7"
                  signature: "5j7s...base58..."
              limitIsolated:
                summary: GTC Limit Order routed into the per-instrument isolated account
                value:
                  actions:
                    - l:
                        c: BTC-USD
                        b: true
                        px: 100000.0
                        sz: 0.1
                        tif: GTC
                        r: false
                        i: true
                  nonce: 1704067200030
                  account: "FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7"
                  signer: "FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7"
                  signature: "5j7s...base58..."
              limitFromSubAccount:
                summary: GTC Limit Order placed from a sub-account (master signs, account = sub pubkey)
                value:
                  actions:
                    - l:
                        c: BTC-USD
                        b: true
                        px: 100000.0
                        sz: 0.1
                        tif: GTC
                        r: false
                        i: false
                  nonce: 1704067200031
                  account: "8x7iUti9m6L6Y9yQPXkXj4zD2uP1Qx5Eo9W4vYm6cGmR"
                  signer: "FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7"
                  signature: "5j7s...base58..."
              marketOrder:
                summary: Market Order
                value:
                  actions:
                    - m:
                        c: BTC-USD
                        b: true
                        sz: 0.1
                        r: false
                        i: false
                  nonce: 1704067200001
                  account: "FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7"
                  signer: "FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7"
                  signature: "5j7s...base58..."
              modifyOrder:
                summary: Modify Order Size
                value:
                  actions:
                    - mod:
                        oid: "Fpa3oVuL3UzjNANAMZZdmrn6D1Zhk83GmBuJpuAWG51F"
                        symbol: BTC-USD
                        amount: 0.05
                  nonce: 1704067200008
                  account: "FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7"
                  signer: "FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7"
                  signature: "5j7s...base58..."
              cancelSingle:
                summary: Cancel Single Order
                value:
                  actions:
                    - cx:
                        c: BTC-USD
                        oid: "order_hash_base58"
                  nonce: 1704067200002
                  account: "5Am6JkEHAjYG1itNWRMGpQrxvY8AaqkXCo1TZvenqVux"
                  signer: "5Am6JkEHAjYG1itNWRMGpQrxvY8AaqkXCo1TZvenqVux"
                  signature: "rpkxJezRft2xqfFxaqYRCTRtoobV4Z2Btqj6P52bEcAKczLn5Rgf2Yfm37UN4HGJwywR4QkuDjJUkwZ93DB2Fw9"
              cancelAll:
                summary: Cancel All Orders
                value:
                  actions:
                    - cxa:
                        c: ["BTC-USD"]
