        iso:
          type: boolean
          description: "`true` if this row belongs to a per-instrument isolated account, otherwise `false`"

    # Trading Schemas (Signed)

    Transaction:
      type: object
      description: |
        Unified signed transaction. All state-mutating operations use this model.

        The `actions` array can contain any combination of action types, executed atomically.

        **Must be signed** - see [Transaction Signing](/api-reference/signing) for signing details.
      required:
        - actions
        - nonce
        - account
        - signer
        - signature
      properties:
        actions:
          type: array
          description: |
            Array of actions to execute atomically. Each action is a tagged object where the key is the compact action tag.

            Action types: `l`, `m`, `mod`, `cx`, `cxa`, `st`, `tp`, `rng`, `trig`, `trl`, `of`, `faucet`, `agentWalletCreation`, `updateUserSettings`, `createSubAccount`, `removeSubAccount`, `renameSubAccount`, `transfer`, `createMultisig`, `msp`, `msa`, `msr`, `msc`, `mse`, `msu`, `whitelistFaucet` (admin), `px` (admin), `o` (admin)
          items:
            $ref: "#/components/schemas/Action"
        nonce:
          type: integer
          format: int64
          description: Unique nonce for replay protection (use timestamp in nanoseconds or incrementing counter)
        account:
          type: string
          description: |
            Account public key (base58) whose account is being acted on. Must be a master pubkey or a sub-account pubkey. Per-instrument isolated accounts are managed implicitly via the `i` flag on order actions and are never set as `account`.
          example: "FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7"
        signer:
          type: string
          description: |
            Signer public key (base58); who is signing. One of:
            - the `account` itself;
            - when `account` is a sub-account: the parent master, or an [agent wallet](/api-reference/manageAgentWallet) registered on the parent master (automatically authorized for its sub-accounts);
            - an agent wallet registered directly on `account`.
          example: "FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7"
        signature:
          type: string
          description: Ed25519 signature of wincode_serialize(actions + nonce + account) (base58)
          example: "5j7sVt3k2YxPqH4w..."

    Action:
      description: |
        Tagged action object. Each action type is an externally tagged enum using compact action tags.
      oneOf:
        - title: Limit order (l)
          type: object
          description: Place a resting limit order
          required: [l]
          properties:
            l:
              type: object
              required: [c, b, px, sz, tif, r, i]
              properties:
                c:
                  type: string
                  description: Symbol
                  example: BTC-USD
                b:
                  type: boolean
                  description: true = buy, false = sell
                px:
                  type: number
                  description: Limit price
                  example: 100000.0
                sz:
                  type: number
                  description: Size / quantity
                  example: 0.1
                tif:
                  type: string
                  enum: [GTC, IOC, ALO]
                  description: Time in force (GTC = rests on book, IOC = immediate or cancel, ALO = post-only)
                r:
                  type: boolean
                  description: Reduce only
                i:
                  type: boolean
                  description: |
                    Required. `true` routes the order into the per-instrument isolated account under the signing account; `false` keeps base-account routing.
                    Must be present in the JSON; the field is part of the canonical wincode binary message and omitting it produces a `bad signature`.
        - title: Market order (m)
          type: object
          description: Execute at market price immediately
          required: [m]
          properties:
            m:
              type: object
              required: [c, b, sz, r, i]
              properties:
                c:
                  type: string
                  description: Symbol
                  example: BTC-USD
                b:
                  type: boolean
                  description: true = buy, false = sell
                sz:
                  type: number
                  description: Size / quantity
                  example: 0.1
                r:
                  type: boolean
                  description: Reduce only
                i:
                  type: boolean
                  description: |
                    Required. `true` routes the order into the per-instrument isolated account under the signing account; `false` keeps base-account routing.
                    Must be present in the JSON; the field is part of the canonical wincode binary message and omitting it produces a `bad signature`.
        - title: Modify order (mod)
          type: object
          description: Modify the size of an existing resting order
          required: [mod]
          properties:
            mod:
              type: object
              required: [oid, symbol, amount]
              properties:
                oid:
                  type: string
                  description: Order ID (base58 hash)
                  example: "Fpa3oVuL3UzjNANAMZZdmrn6D1Zhk83GmBuJpuAWG51F"
                symbol:
                  type: string
                  description: Symbol
                  example: BTC-USD
                amount:
                  type: number
                  description: New order size
                  example: 0.05
        - title: Cancel order (cx)
          type: object
          description: Cancel a specific order by ID
          required: [cx]
          properties:
            cx:
              type: object
              required: [c, oid]
              properties:
                c:
                  type: string
                  description: Symbol
                  example: BTC-USD
                oid:
                  type: string
                  description: Order ID (base58 hash)
                  example: "Fpa3oVuL3UzjNANAMZZdmrn6D1Zhk83GmBuJpuAWG51F"
        - title: Cancel all (cxa)
          type: object
          description: Cancel all orders (optionally filtered by symbol)
          required: [cxa]
          properties:
            cxa:
              type: object
              required: [c]
              properties:
                c:
                  type: array
                  description: Symbols to cancel. Empty array `[]` cancels all symbols.
                  items:
                    type: string
                  example: ["BTC-USD"]
        - title: Stop (st)
          type: object
          description: Place a conditional stop order
          required: [st]
          properties:
            st:
              type: object
              required: [c, d, sz, tr, i]
              properties:
                c:
                  type: string
                  description: Symbol
                  example: BTC-USD
                d:
                  type: boolean
                  description: Trigger direction (`true` = trigger above/equal threshold, `false` = below/equal)
                sz:
                  type: number
                  description: Size to execute on trigger
                  example: 0.25
                tr:
                  type: number
                  description: Trigger threshold
                  example: 98000.0
                lim:
                  type: number
                  nullable: true
                  description: Optional triggered limit price. Omit for market-style trigger
                  example: 97950.0
                i:
                  type: boolean
                  description: |
                    Required. `true` routes the triggered order into the per-instrument isolated account under the signing account; `false` keeps base-account routing.
                    Must be present in the JSON; the field is part of the canonical wincode binary message and omitting it produces a `bad signature`.
        - title: Take profit (tp)
          type: object
          description: Place a conditional take-profit order
          required: [tp]
          properties:
            tp:
              type: object
              required: [c, d, sz, tr, i]
              properties:
                c:
                  type: string
                  description: Symbol
                  example: BTC-USD
                d:
                  type: boolean
                  description: Trigger direction (`true` = trigger above/equal threshold, `false` = below/equal)
                sz:
                  type: number
                  description: Size to execute on trigger
                  example: 0.25
                tr:
                  type: number
                  description: Trigger threshold
                  example: 104000.0
                lim:
                  type: number
                  nullable: true
                  description: Optional triggered limit price. Omit for market-style trigger
                  example: 103950.0
                i:
                  type: boolean
                  description: |
                    Required. `true` routes the triggered order into the per-instrument isolated account under the signing account; `false` keeps base-account routing.
                    Must be present in the JSON; the field is part of the canonical wincode binary message and omitting it produces a `bad signature`.
        - title: Range / OCO (rng)
          type: object
          description: Place a range collar (OCO) conditional order
          required: [rng]
          properties:
            rng:
              type: object
              required: [c, d, sz, pmin, pmax, i]
              properties:
                c:
                  type: string
                  description: Symbol
                  example: BTC-USD
                d:
                  type: boolean
                  description: Position direction (`true` = buy/long collar, `false` = sell/short collar)
                sz:
                  type: number
                  description: Size to protect/exit
                  example: 0.5
                pmin:
                  type: number
                  description: Lower trigger threshold
                  example: 96000.0
                pmax:
                  type: number
                  description: Upper trigger threshold
                  example: 106000.0
                lmin:
                  type: number
                  nullable: true
                  description: Optional limit for the lower-trigger leg
                  example: 95950.0
                lmax:
                  type: number
                  nullable: true
                  description: Optional limit for the upper-trigger leg
                  example: 105950.0
                i:
                  type: boolean
                  description: |
                    Required. `true` routes the triggered legs into the per-instrument isolated account under the signing account; `false` keeps base-account routing.
                    Must be present in the JSON; the field is part of the canonical wincode binary message and omitting it produces a `bad signature`.
        - title: Trigger basket (trig)
          type: object
          description: Place a trigger basket order that executes nested actions when threshold is crossed
          required: [trig]
          properties:
            trig:
              type: object
              required: [c, d, tr, actions, i]
              properties:
                c:
                  type: string
                  description: Symbol
                  example: BTC-USD
                d:
                  type: boolean
                  description: Trigger direction (`true` = trigger above/equal threshold, `false` = below/equal)
                tr:
                  type: number
                  description: Trigger threshold
                  example: 105000.0
                actions:
                  type: array
                  description: |
                    Nested actions executed when trigger fires.
                    Allowed today: `m`, `l`, `mod`, `cx`, `cxa`, `st`, `tp`, `rng`, `trl`.
                  items:
                    type: object
                    description: Nested action object using the same compact action tags as top-level actions
                i:
                  type: boolean
                  description: |
                    Required. `true` routes trigger execution into the per-instrument isolated account under the signing account; `false` keeps base-account routing.
                    Must be present in the JSON; the field is part of the canonical wincode binary message and omitting it produces a `bad signature`.
        - title: Trailing stop (trl)
          type: object
          description: Place a trailing-stop conditional root
          required: [trl]
          properties:
            trl:
              type: object
              required: [c, b, sz, trb, stb, i]
              properties:
                c:
                  type: string
                  description: Symbol
                  example: BTC-USD
                b:
                  type: boolean
                  description: Protected position direction (`true` = long protection, `false` = short protection)
                sz:
                  type: number
                  description: Size to protect/exit
                  example: 0.25
                trb:
                  type: integer
                  format: int32
                  description: Trailing distance in bps
                  example: 100
                stb:
                  type: integer
                  format: int32
                  description: Favorable reset step in bps
                  example: 10
                lim:
                  type: number
                  nullable: true
                  description: Optional triggered limit price. Omit for market-style trigger
                  example: null
                i:
                  type: boolean
                  description: |
                    Required. `true` routes trailing execution into the per-instrument isolated account under the signing account; `false` keeps base-account routing.
                    Must be present in the JSON; the field is part of the canonical wincode binary message and omitting it produces a `bad signature`.
        - title: On-fill (of)
          type: object
          description: Register one-shot consequents to fire on the first fill of a parent action in the same transaction
          required: [of]
          properties:
            of:
              type: object
              required: [p, actions]
              properties:
                p:
                  type: integer
                  format: int32
                  minimum: 0
                  description: Parent action seqno in the same transaction. In normal processing this seqno is assigned from action position (0..n-1), so it is usually the parent action index.
                  example: 0
                actions:
                  type: array
                  description: |
                    One-shot consequents executed on first fill of the parent.
                    Allowed today: `m`, `l`, `mod`, `cx`, `cxa`, `st`, `tp`, `rng`, `trig`, `trl`.
                    Parent candidates for `of` are `m`, `l`, `st`, `tp`, `rng`, `trl` (`trig` is not a parent candidate).
                  items:
                    type: object
                    description: Nested action object using the same compact action tags as top-level actions
        - title: Faucet (faucet)
          type: object
          description: Request testnet faucet funds (fixed 10,000 per claim; once per 24 hours per account)
          required: [faucet]
          properties:
            faucet:
              type: object
              required: [u]
              properties:
                u:
                  type: string
                  description: Recipient public key (base58)
                  example: "FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7"
                amount:
                  type: number
                  description: Optional; ignored for testnet. Each claim credits a fixed 10,000.
                  nullable: true
        - title: Agent wallet (agentWalletCreation)
          type: object
          description: Register or remove an agent wallet
          required: [agentWalletCreation]
          properties:
            agentWalletCreation:
              type: object
              required: [a, d]
              properties:
                a:
                  type: string
                  description: Agent public key (base58)
                d:
                  type: boolean
                  description: true = remove agent, false = add agent
        - title: Update user settings (updateUserSettings)
          type: object
          description: Update per-symbol leverage settings
          required: [updateUserSettings]
          properties:
            updateUserSettings:
              type: object
              required: [m]
              properties:
                m:
                  type: object
                  description: Map of symbol to max leverage (1.0–50.0)
                  additionalProperties:
                    type: number
                  example:
                    BTC-USD: 5.0
                    ETH-USD: 3.0
        - title: Whitelist faucet (admin)
          type: object
          description: Whitelist or un-whitelist an account for faucet access (admin)
          required: [whitelistFaucet]
          properties:
            whitelistFaucet:
              type: object
              required: [target, whitelist]
              properties:
                target:
                  type: string
                  description: Target account public key (base58)
                  example: "9J8TUdEWrrcADK913r1Cs7DdqX63VdVU88imfDzT1ypt"
                whitelist:
                  type: boolean
                  description: true = whitelist, false = un-whitelist
        - title: Oracle price (px, admin)
          type: object
          description: Submit a price action update (admin/oracle feeder)
          required: [px]
          properties:
            px:
              type: object
              required: [t, c, px]
              properties:
                t:
                  type: integer
                  format: int64
                  description: Timestamp (nanoseconds)
                c:
                  type: string
                  description: Asset symbol
                  example: BTC-USD
                px:
                  type: number
                  description: Oracle price
                  example: 102500.0
        - title: Pyth oracle batch (o, admin)
          type: object
          description: Batch Pyth oracle price updates (admin/oracle feeder)
          required: [o]
          properties:
            o:
              type: object
              required: [oracles]
              properties:
                oracles:
                  type: array
                  description: Array of Pyth price updates
                  items:
                    type: object
                    required: [t, fi, px, e]
                    properties:
                      t:
                        type: integer
                        format: int64
                        description: Timestamp (nanoseconds)
                      fi:
                        type: integer
                        format: int64
                        description: Pyth feed ID
                      px:
                        type: integer
                        format: int64
                        description: Price (raw integer, apply exponent)
                      e:
                        type: integer
                        format: int16
                        description: Price exponent (e.g., -8 means price * 10^-8)
        - title: Create sub-account (createSubAccount)
          type: object
          description: |
            Create a named sub-account under the signing master account. Sub-accounts hold
            their own margin, positions, and orders evaluated independently by the risk engine.
            See [Sub-Accounts (Signed)](/api-reference/manageSubAccounts).
          required: [createSubAccount]
          properties:
            createSubAccount:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  description: Sub-account display name (1-32 chars, `A-Z a-z 0-9 - _`)
                  example: "desk-1"
                marginSymbol:
                  type: string
                  nullable: true
                  description: Optional margin asset symbol to seed the sub-account with. Must be present when `marginAmount` is non-zero.
                  example: "USDC"
                marginAmount:
                  type: number
                  nullable: true
                  description: Optional initial margin amount transferred from master at creation time. Default `0.0`. Must be a JSON number (unquoted), e.g. `0` or `1000.0`, not `"0"` or `"1000.0"`.
                  example: 1000.0
        - title: Remove sub-account (removeSubAccount)
          type: object
          description: |
            Remove a flat sub-account and sweep any remaining margin back to the parent. Also used to remove an auto-created per-instrument [isolated account](/bulk-exchange/isolated-margin) by passing its `isoPubkey` as `toRemove` (margin is swept back to the master/sub-account that owns it).
            The target must have no open positions and no open orders.
          required: [removeSubAccount]
          properties:
            removeSubAccount:
              type: object
              required: [toRemove]
              properties:
                toRemove:
                  type: string
                  description: Sub-account or isolated-account public key (base58) to remove
                  example: "8x7iUti9m6L6Y9yQPXkXj4zD2uP1Qx5Eo9W4vYm6cGmR"
        - title: Rename sub-account (renameSubAccount)
          type: object
          description: |
            Rename an existing sub-account owned by the signing master. The pubkey is unchanged,
            so cached references and isolated-account links keep working.
            See [Sub-Accounts (Signed)](/api-reference/manageSubAccounts).
          required: [renameSubAccount]
          properties:
            renameSubAccount:
              type: object
              required: [a, n]
              properties:
                a:
                  type: string
                  description: Sub-account public key (base58) to rename. Must belong to the signing master.
                  example: "8x7iUti9m6L6Y9yQPXkXj4zD2uP1Qx5Eo9W4vYm6cGmR"
                n:
                  type: string
                  description: New display name (1-32 chars, `A-Z a-z 0-9 - _`). Must be unique within the master tree.
                  example: "desk-2"
        - title: Transfer (transfer)
          type: object
          description: |
            Transfer margin between accounts (`internal` between master and its sub-accounts / per-instrument isolated accounts,
            `external` to any account on the network). Use `internal` with `to = isoPubkey`
            to top up a per-instrument isolated account. See [Transfer (Signed)](/api-reference/transfer).
          required: [transfer]
          properties:
            transfer:
              type: object
              required: [from, to, marginSymbol, marginAmount]
              properties:
                k:
                  type: string
                  enum: [internal, external]
                  description: Transfer kind. Defaults to `internal`.
                  default: internal
                from:
                  type: string
                  description: Source account public key (base58)
                  example: "FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7"
                to:
                  type: string
                  description: Destination account public key (base58). Use the position row's `isoPubkey` to top up a per-instrument isolated account.
                  example: "8x7iUti9m6L6Y9yQPXkXj4zD2uP1Qx5Eo9W4vYm6cGmR"
                marginSymbol:
                  type: string
                  description: Margin asset symbol
                  example: "USDC"
                marginAmount:
                  type: number
                  description: Margin amount to transfer
                  example: 100.0
        - title: Create multisig (createMultisig)
          type: object
          description: |
            Create a protocol-native multisig smart account with M-of-N threshold,
            time-lock, and proposal lifetime policy. See [Multisig (Signed)](/api-reference/manageMultisig).
          required: [createMultisig]
          properties:
            createMultisig:
              type: object
              required: [signers, threshold, timeLockSecs, proposalLifetimeSecs]
              properties:
                signers:
                  type: array
                  description: Authorized signer pubkeys (1-32, no duplicates)
                  items:
                    type: string
                  example:
                    - "FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7"
                    - "5Am6JkEHAjYG1itNWRMGpQrxvY8AaqkXCo1TZvenqVux"
                threshold:
                  type: integer
                  format: uint32
                  description: Required approvals to execute (1 ≤ threshold ≤ signers.length)
                  example: 2
                timeLockSecs:
                  type: integer
                  format: uint32
                  description: Mandatory delay between threshold-reached and execution, in seconds (0–30 days)
                  example: 60
                proposalLifetimeSecs:
                  type: integer
                  format: uint32
                  description: Proposal lifetime in seconds (1 hour to 90 days)
                  example: 604800
        - title: Multisig propose (msp)
          type: object
          description: Submit a new proposal containing one or more inner actions. The proposer's signature counts as the first approval.
          required: [msp]
          properties:
            msp:
              type: object
              required: [m, a]
              properties:
                m:
                  type: string
                  description: Multisig account pubkey (base58)
                  example: "6q8Y4f6g8tR4mQ1H2Zr3u9x7k9a4nS2Yx1g6Wm8qJ5tK"
                a:
                  type: array
                  description: Inner actions to execute when the proposal is approved
                  items:
                    type: object
                    description: Nested action object (same compact tags as top-level actions)
        - title: Multisig approve (msa)
          type: object
          description: Approve an open proposal as a signer of the multisig.
          required: [msa]
          properties:
            msa:
              type: object
              required: [m, p]
              properties:
                m:
                  type: string
                  description: Multisig account pubkey (base58)
                p:
                  type: integer
                  format: uint64
                  description: Proposal ID
                  example: 7
        - title: Multisig reject (msr)
          type: object
          description: Reject an open proposal. Reaches terminal `rejected` once enough rejections accumulate that the threshold can no longer be met.
          required: [msr]
          properties:
            msr:
              type: object
              required: [m, p]
              properties:
                m:
                  type: string
                  description: Multisig account pubkey (base58)
                p:
                  type: integer
                  format: uint64
                  description: Proposal ID
        - title: Multisig cancel (msc)
          type: object
          description: Cancel an open proposal you created (proposer-only).
          required: [msc]
          properties:
            msc:
              type: object
              required: [m, p]
              properties:
                m:
                  type: string
                  description: Multisig account pubkey (base58)
                p:
                  type: integer
                  format: uint64
                  description: Proposal ID
        - title: Multisig execute (mse)
          type: object
          description: Trigger execution of a `ready` proposal once its time-lock has elapsed.
          required: [mse]
          properties:
            mse:
              type: object
              required: [m, p]
              properties:
                m:
                  type: string
                  description: Multisig account pubkey (base58)
                p:
                  type: integer
                  format: uint64
                  description: Proposal ID
        - title: Multisig update policy (msu)
          type: object
          description: Update the multisig signer set, threshold, time-lock, or proposal lifetime. Policy updates can only happen through the proposal flow.
          required: [msu]
          properties:
            msu:
              type: object
              required: [m, signers, threshold, timeLockSecs, proposalLifetimeSecs]
              properties:
                m:
                  type: string
                  description: Multisig account pubkey (base58)
                signers:
                  type: array
                  items:
                    type: string
                  description: New signer set
                threshold:
                  type: integer
                  format: uint32
                  description: New approval threshold
                timeLockSecs:
                  type: integer
                  format: uint32
                  description: New time-lock in seconds
                proposalLifetimeSecs:
                  type: integer
                  format: uint32
                  description: New proposal lifetime in seconds

    OrderResponse:
      type: object
      required: [status, response]
      description: |
        Transaction accepted. One status per execution event in `response.data.statuses`.

        Response from `POST /order`. One entry in `response.data.statuses` per execution
        event (e.g. one per order placed, or one for faucet/agent/settings).
        Status variants: resting, working, filled, partiallyFilled, cancelled, cancelledRiskLimit,
        cancelledSelfCrossing, cancelledReduceOnly, cancelledIoc,
        rejectedCrossing, rejectedDuplicate, rejectedRiskLimit, rejectedInvalid, deposit, depositFailed, agentWallet, agentWalletFailed,
        cancelOneRejected, cancelAllRejected, triggered, siblingCancelled, triggerFailed,
        transfer, transferFailed, createSubAccount, createSubAccountFailed,
        removeSubAccount, removeSubAccountFailed,
        renameSubAccount, renameSubAccountFailed,
        multisigCreated, multisigCreatedFailed, proposalCreated, proposalApproved,
        proposalReadyForExecution, proposalExecuted, proposalFailed, proposalExpired,
        proposalCancelled, proposalRejected, error.
      properties:
        status:
          type: string
          enum: [ok, error]
          description: Top-level status (ok when request was accepted; check each item in statuses for per-action result)
        response:
          type: object
          required: [type, data]
          properties:
            type:
              type: string
              description: Always "order"
            data:
              type: object
              required: [statuses]
              properties:
                statuses:
                  type: array
                  description: One status object per execution event
                  items:
                    oneOf:
                      - title: resting
                        type: object
                        description: Order placed and resting on book (non-terminal)
                        properties:
                          resting:
                            type: object
                            properties:
                              oid:
                                type: string
                                description: Order ID (base58)
                      - title: working
                        type: object
                        description: Order resting with partial fills (non-terminal)
                        properties:
                          working:
                            type: object
                            properties:
                              oid:
                                type: string
                                description: Order ID (base58)
                              filledSz:
                                type: number
                                description: Filled size so far (signed; negative for sell-side)
                              remainingSz:
                                type: number
                                description: Remaining size (signed; negative for sell-side)
                              vwap:
                                type: number
                                description: Volume-weighted average price
                      - title: filled
                        type: object
                        description: Order fully filled (terminal)
                        properties:
                          filled:
                            type: object
                            properties:
                              oid:
                                type: string
                                description: Order ID (base58)
                              totalSz:
                                type: number
                                description: Total filled size (signed; negative for sell-side)
                              avgPx:
                                type: number
                                description: Average fill price (VWAP)
                      - title: partiallyFilled
                        type: object
                        description: Order partially filled and terminal
                        properties:
                          partiallyFilled:
                            type: object
                            properties:
                              oid:
                                type: string
                                description: Order ID (base58)
                              totalSz:
                                type: number
                                description: Total filled size (signed; negative for sell-side)
                              avgPx:
                                type: number
                                description: Average fill price (VWAP)
                      - title: cancelled
                        type: object
                        description: Order cancelled by user
                        properties:
                          cancelled:
                            type: object
                            properties:
                              oid:
                                type: string
                                description: Order ID (base58)
                      - title: cancelledRiskLimit
                        type: object
                        description: Cancelled due to risk limit violation
                        properties:
                          cancelledRiskLimit:
                            type: object
                            properties:
                              oid:
                                type: string
                                description: Order ID (base58)
                              reason:
                                type: string
                                nullable: true
                      - title: cancelledSelfCrossing
                        type: object
                        description: Cancelled due to self-crossing (STP)
                        properties:
                          cancelledSelfCrossing:
                            type: object
                            properties:
                              oid:
                                type: string
                                description: Order ID (base58)
                      - title: cancelledReduceOnly
                        type: object
                        description: Cancelled - would not reduce position
                        properties:
                          cancelledReduceOnly:
                            type: object
                            properties:
                              oid:
                                type: string
                                description: Order ID (base58)
                      - title: cancelledIoc
                        type: object
                        description: IOC expired without full fill
                        properties:
                          cancelledIoc:
                            type: object
                            properties:
                              oid:
                                type: string
                                description: Order ID (base58)
                              filledSz:
                                type: number
                                description: Size filled before expiry (signed; negative for sell-side)
                      - title: rejectedCrossing
                        type: object
                        description: Post-only rejected for crossing
                        properties:
                          rejectedCrossing:
                            type: object
                            properties:
                              oid:
                                type: string
                                description: Order ID (base58)
                      - title: rejectedDuplicate
                        type: object
                        description: Duplicate order ID
                        properties:
                          rejectedDuplicate:
                            type: object
                            properties:
                              oid:
                                type: string
                                description: Order ID (base58)
                      - title: rejectedRiskLimit
                        type: object
                        description: Rejected due to risk limit on submission
                        properties:
                          rejectedRiskLimit:
                            type: object
                            properties:
                              oid:
                                type: string
                                description: Order ID (base58)
                              reason:
                                type: string
                                nullable: true
                      - title: rejectedInvalid
                        type: object
                        description: Invalid order parameters
                        properties:
                          rejectedInvalid:
                            type: object
                            properties:
                              oid:
                                type: string
                                description: Order ID (base58)
                              reason:
                                type: string
                                nullable: true
                      - title: deposit
                        type: object
                        description: Faucet deposit succeeded
                        properties:
                          deposit:
                            type: object
                            properties:
                              amount:
                                type: number
                      - title: depositFailed
                        type: object
                        description: Faucet deposit failed
                        properties:
                          depositFailed:
                            type: object
                            properties:
                              message:
                                type: string
                      - title: agentWallet
                        type: object
                        description: Agent wallet registered
                        properties:
                          agentWallet:
                            type: object
                            properties:
                              agentWallet:
                                type: string
                      - title: agentWalletFailed
                        type: object
                        description: Agent wallet operation failed
                        properties:
                          agentWalletFailed:
                            type: object
                            properties:
                              message:
                                type: string
                      - title: cancelOneRejected
                        type: object
                        description: Single cancel rejected
                        properties:
                          cancelOneRejected:
                            type: object
                            properties:
                              oid:
                                type: string
                              reason:
                                type: string
                      - title: cancelAllRejected
                        type: object
                        description: Cancel-all rejected
                        properties:
                          cancelAllRejected:
                            type: object
                            properties:
                              reason:
                                type: string
                      - title: triggered
                        type: object
                        description: Conditional root fired (non-terminal)
                        properties:
                          triggered:
                            type: object
                            properties:
                              oid:
                                type: string
                                description: Order ID (base58)
                      - title: siblingCancelled
                        type: object
                        description: OCO sibling auto-cancelled
                        properties:
                          siblingCancelled:
                            type: object
                            properties:
                              oid:
                                type: string
                                description: Order ID (base58)
                      - title: triggerFailed
                        type: object
                        description: Trigger execution failed
                        properties:
                          triggerFailed:
                            type: object
                            properties:
                              oid:
                                type: string
                                description: Order ID (base58)
                              reason:
                                type: string
                                nullable: true
                      - title: transfer
                        type: object
                        description: Margin transfer succeeded
                        properties:
                          transfer:
                            type: object
                            properties:
                              from:
                                type: string
                                description: Source account pubkey (base58)
                              to:
                                type: string
                                description: Destination account pubkey (base58)
                              symbol:
                                type: string
                                description: Margin asset symbol
                              amount:
                                type: number
                      - title: transferFailed
                        type: object
                        description: Margin transfer failed
                        properties:
                          transferFailed:
                            type: object
                            properties:
                              message:
                                type: string
                      - title: createSubAccount
                        type: object
                        description: Sub-account creation succeeded
                        properties:
                          createSubAccount:
                            type: object
                            properties:
                              master:
                                type: string
                                description: Owning master account pubkey (base58)
                              sub:
                                type: string
                                description: Newly created sub-account pubkey (base58)
                              name:
                                type: string
                                description: Display name
                              margin:
                                type: number
                                description: Initial margin transferred from master at creation (0 when none requested)
                      - title: createSubAccountFailed
                        type: object
                        description: Sub-account creation failed
                        properties:
                          createSubAccountFailed:
                            type: object
                            properties:
                              message:
                                type: string
                      - title: removeSubAccount
                        type: object
                        description: Sub-account removal succeeded; remaining margin is swept back to master
                        properties:
                          removeSubAccount:
                            type: object
                            properties:
                              account:
                                type: string
                                description: Removed sub-account pubkey (base58)
                              marginMoved:
                                type: number
                                description: Margin amount returned to the master account
                      - title: removeSubAccountFailed
                        type: object
                        description: Sub-account removal failed
                        properties:
                          removeSubAccountFailed:
                            type: object
                            properties:
                              message:
                                type: string
                      - title: renameSubAccount
                        type: object
                        description: Sub-account rename succeeded
                        properties:
                          renameSubAccount:
                            type: object
                            properties:
                              master:
                                type: string
                                description: Owning master account pubkey (base58)
                              account:
                                type: string
                                description: Sub-account pubkey that was renamed (base58)
                              name:
                                type: string
                                description: New display name
                      - title: renameSubAccountFailed
                        type: object
                        description: Sub-account rename failed
                        properties:
                          renameSubAccountFailed:
                            type: object
                            properties:
                              message:
                                type: string
                      - title: multisigCreated
                        type: object
                        description: Multisig account created
                        properties:
                          multisigCreated:
                            type: object
                            properties:
                              pubkey:
                                type: string
                                description: New multisig account pubkey (base58)
                              threshold:
                                type: integer
                                format: uint32
                              signersLen:
                                type: integer
                                format: uint32
                              timeLockSecs:
                                type: integer
                                format: uint32
                              lifetimeSecs:
                                type: integer
                                format: uint32
                              creator:
                                type: string
                      - title: multisigCreatedFailed
                        type: object
                        description: Multisig creation failed
                        properties:
                          multisigCreatedFailed:
                            type: object
                            properties:
                              message:
                                type: string
                      - title: proposalCreated
                        type: object
                        description: Multisig proposal created (non-terminal)
                        properties:
                          proposalCreated:
                            $ref: "#/components/schemas/MultisigProposalEvent"
                      - title: proposalApproved
                        type: object
                        description: Multisig proposal approved (non-terminal)
                        properties:
                          proposalApproved:
                            $ref: "#/components/schemas/MultisigProposalEvent"
                      - title: proposalReadyForExecution
                        type: object
                        description: Multisig proposal reached threshold and is awaiting time-lock (non-terminal)
                        properties:
                          proposalReadyForExecution:
                            $ref: "#/components/schemas/MultisigProposalEvent"
                      - title: proposalExecuted
                        type: object
                        description: Multisig proposal executed atomically (terminal)
                        properties:
                          proposalExecuted:
                            $ref: "#/components/schemas/MultisigProposalEvent"
                      - title: proposalFailed
                        type: object
                        description: Multisig proposal execution failed and was rolled back (terminal)
                        properties:
                          proposalFailed:
                            allOf:
                              - $ref: "#/components/schemas/MultisigProposalEvent"
                              - type: object
                                properties:
                                  message:
                                    type: string
                      - title: proposalExpired
                        type: object
                        description: Multisig proposal expired before execution (terminal)
                        properties:
                          proposalExpired:
                            $ref: "#/components/schemas/MultisigProposalEvent"
                      - title: proposalCancelled
                        type: object
                        description: Multisig proposal cancelled by proposer (terminal)
                        properties:
                          proposalCancelled:
                            $ref: "#/components/schemas/MultisigProposalEvent"
                      - title: proposalRejected
                        type: object
                        description: "Multisig proposal rejected: threshold can no longer be met (terminal)"
                        properties:
                          proposalRejected:
                            $ref: "#/components/schemas/MultisigProposalEvent"
                      - title: error
                        type: object
                        description: Generic error
                        properties:
                          error:
                            type: object
                            properties:
                              message:
                                type: string

    MultisigProposalsSnapshot:
      type: object
      description: |
        Full proposal list for a multisig account. Returned by `GET /multisig/{pubkey}/proposals`.
      required: [multisig, proposals]
      properties:
        multisig:
          type: string
          description: Multisig account pubkey (base58)
        proposals:
          type: array
          items:
            $ref: "#/components/schemas/MultisigProposalRow"

    MultisigProposalRow:
      type: object
      description: One proposal row in the multisig snapshot
      properties:
        proposalId:
          type: integer
          format: uint64
        proposer:
          type: string
          description: Proposer pubkey (base58)
        createdAt:
          type: integer
          format: int64
          description: Proposal creation timestamp (ms)
        executeAfter:
          type: integer
          format: int64
          description: Earliest execution timestamp (ms) once threshold is met
        expiresAt:
          type: integer
          format: int64
          description: Proposal expiry timestamp (ms)
        approvals:
          type: array
          description: Pubkeys of signers that approved
          items:
            type: string
        rejections:
          type: array
          description: Pubkeys of signers that rejected
          items:
            type: string
        approvalsCount:
          type: integer
          format: uint32
        rejectionsCount:
          type: integer
          format: uint32
        status:
          type: string
          enum: [pending, ready, executed, failed, expired, cancelled, rejected]
        actions:
          type: array
          description: Inner proposal actions exactly as stored at creation
          items:
            type: object
        error:
          type: string
          nullable: true
          description: Error message when `status` is `failed`

    MultisigProposalEvent:
      type: object
      description: Snapshot of a multisig proposal at the time of an event
      properties:
        multisig:
          type: string
          description: Multisig account pubkey (base58)
        proposalId:
          type: integer
          format: uint64
        status:
          type: string
          enum: [pending, ready, executed, failed, expired, cancelled, rejected]
        approvals:
          type: integer
          format: uint32
          description: Approval count
        rejections:
          type: integer
          format: uint32
          description: Rejection count
        threshold:
          type: integer
          format: uint32
        executeAfter:
          type: integer
          format: int64
          description: Earliest execution timestamp (ms) once threshold is met
        expiresAt:
          type: integer
          format: int64
          description: Proposal expiry timestamp (ms)
        signer:
          type: string
          nullable: true
          description: Signer that triggered this event (when applicable)
        proposer:
          type: string
          nullable: true
          description: Original proposer of the proposal

# ===================================================================
# WEBSOCKET API REFERENCE
# ===================================================================

x-websocket-api: |
  # WebSocket API

  Connect to: `wss://exchange-ws1.bulk.trade`

  ## Market Data Streams (Real-time)

  ### Ticker Stream
  ```json
  {
    "method": "subscribe",
    "subscription": [{
      "type": "ticker",
      "symbol": "BTC-USD"
    }]
  }
  ```
  **Updates**: Every 200ms
  **Topic**: `ticker.BTC-USD`

  ### Candles Stream
  ```json
  {
    "method": "subscribe",
    "subscription": [{
      "type": "candle",
      "symbol": "BTC-USD",
      "interval": "1m"
    }]
  }
  ```
  **Initial**: Up to 5000 historical candles
  **Updates**: Real-time
  **Topic**: `candle.BTC-USD.1m`

  ### Trades Stream
  ```json
  {
    "method": "subscribe",
    "subscription": [{
      "type": "trades",
      "symbol": "BTC-USD"
    }]
  }
  ```
  **Initial**: None (stateless)
  **Updates**: Real-time
  **Topic**: `trades.BTC-USD`
  **Data**: `{s, px, sz, time, side, maker, taker, reason?}`

  ### Risk Metrics Stream
  ```json
  {
    "method": "subscribe",
    "subscription": [{
      "type": "risk",
      "symbol": "BTC-USD"
    }]
  }
  ```
  **Initial**: Latest cached risk metrics (if available)
  **Updates**: Event-driven (only when asset risk changes)
  **Topic**: `risk.BTC-USD`
  **Data**: `{symbol, timestamp, regime, leverage[], notionals[], buy[][], sell[][], corrs}`

  **Risk Metrics Fields**:
  - `symbol`: Market symbol
  - `timestamp`: Timestamp in milliseconds
  - `regime`: Risk regime index (-12 to 12)
  - `leverage`: Array of leverage knot points [1.0, 2.0, ..., 50.0]
  - `notionals`: Array of notional knot points [50000, 100000, ..., 100000000]
  - `buy`: 2D array of risk points [notional_idx][leverage_idx] for buy side
  - `sell`: 2D array of risk points [notional_idx][leverage_idx] for sell side
  - `buy/sell` point fields:
    - `mmrO`: start-of-regime maintenance margin ratio
    - `mmrE`: end-of-regime maintenance margin ratio
    - `p`: probability of remaining in regime
  - `corrs`: Array of [pair, correlation] tuples (e.g., `[["BTC:ETH", 0.71], ["BTC:SOL", 0.73]]`)

  ### Frontend Context Stream
  ```json
  {
    "method": "subscribe",
    "subscription": [{
      "type": "frontendContext"
    }]
  }
  ```
  **Initial**: Latest cached ticker data for all symbols
  **Updates**: Every 2 seconds
  **Topic**: `frontendContext`
  **Data**: `{ctx: [{symbol, volume, funding, oi, lastPrice, priceChange, priceChangePercent}, ...]}`

  **Context Entry Fields**:
  - `symbol`: Market symbol
  - `volume`: 24h trading volume (base currency)
  - `funding`: Current funding rate
  - `oi`: Open interest (base currency)
  - `lastPrice`: Last traded price
  - `priceChange`: 24h price change (absolute)
  - `priceChangePercent`: 24h price change (percentage)

  ### L2 Snapshot Stream
  ```json
  {
    "method": "subscribe",
    "subscription": [{
      "type": "l2Snapshot",
      "symbol": "BTC-USD",
      "nlevels": 10,
      "aggregation": 0.5
    }]
  }
  ```
  **Initial**: Latest cached snapshot (if available)
  **Updates**: Every 200ms (`MDDepth`) with `nlevels`/`aggregation` applied per subscription
  **If cache is empty**: Wait for next `MDDepth` snapshot
  **Topic**: `l2snapshot.BTC-USD`

  ### L2 Delta Stream
  ```json
  {
    "method": "subscribe",
    "subscription": [{
      "type": "l2Delta",
      "symbol": "BTC-USD"
    }]
  }
  ```
  **Initial**: Latest cached book state (if available)
  **Updates**: Real-time on every price level change
  **Topic**: `l2delta.BTC-USD`
  **Data**: `{book: {updateType: "delta", symbol, levels: [bids, asks], timestamp}}`

  **Delta Format**:
  - Each delta update contains changes to a single price level
  - Only ONE side (bids or asks) will have levels per update (the other is empty `[]`)
  - `levels[0]` = bids (highest to lowest)
  - `levels[1]` = asks (lowest to highest)
  - Each level: `{px, sz, n}` where `n` is always `0` for deltas
  - `timestamp`: Timestamp in milliseconds

  ## Account Stream (Unsigned)

  **Single Account:**
  ```json
  {
    "method": "subscribe",
    "subscription": [{
      "type": "account",
      "user": "FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7"
    }]
  }
  ```

  **Multiple Accounts (Batched):**
  ```json
  {
    "method": "subscribe",
    "subscription": [{
      "type": "account",
      "user": [
        "FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7",
        "5Am6JkEHAjYG1itNWRMGpQrxvY8AaqkXCo1TZvenqVux"
      ]
    }]
  }
  ```

  **Parameters:**
  - `user`: Single pubkey string or array of pubkey strings (base58 format)

  **Response:**
  ```json
  {
    "type": "subscriptionResponse",
    "topics": [
      "account.FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7",
      "account.5Am6JkEHAjYG1itNWRMGpQrxvY8AaqkXCo1TZvenqVux"
    ]
  }
  ```

  **Initial**: Unified account snapshot with positions, orders, margin, and risk metrics (one per account)
  **Updates**: Real-time on account changes (orders, fills, positions, margin) - each account receives updates on its own topic
  **Topic**: `account.{pubkey}` (e.g., `account.9J8TUdEWrrcADK913r1Cs7DdqX63VdVU88imfDzT1ypt`)
  **Data**: See [Account Stream](/api-reference/ws-account) for complete response format including:
  - `accountSnapshot`: Initial unified snapshot
  - `marginUpdate`: Account-level margin changes
  - `positionUpdate`: Position changes with risk metrics (position closes emit a tombstone update with `size: 0`)
  - `orderUpdate`: Comprehensive order state changes (ALL states including working, partiallyFilled, cancelledRiskLimit, etc.)
  - `fill`: Trade execution updates
  - `leverageUpdate`: Leverage settings changes

  **Order Status Values** (in `orderUpdate` messages):
  - `placed`: Order resting on book (non-terminal)
  - `working`: Order has partial fills, still resting (non-terminal)
  - `filled`: Order fully filled (terminal)
  - `partiallyFilled`: Order partially filled and terminal
  - `cancelled`: Order cancelled by user (terminal)
  - `cancelledRiskLimit`: Cancelled due to risk limit (terminal)
  - `cancelledSelfCrossing`: Cancelled due to self-crossing (terminal)
  - `cancelledReduceOnly`: Cancelled - would not reduce position (terminal)
  - `cancelledIoc`: IOC expired without full fill (terminal)
  - `rejectedCrossing`: Post-only rejected for crossing (terminal)
  - `rejectedDuplicate`: Duplicate order ID (terminal)
  - `rejectedRiskLimit`: Rejected due to risk limit (terminal)
  - `rejectedInvalid`: Invalid order parameters (terminal)
  - `triggered`: Conditional root fired (non-terminal)
  - `siblingCancelled`: OCO sibling auto-cancelled (terminal)
  - `triggerFailed`: Trigger execution failed (terminal)

  ## Trading via WebSocket (Signed)

  Uses the same unified Transaction model as HTTP:

  ```json
  {
    "method": "post",
    "request": {
      "type": "action",
      "payload": {
        "actions": [{"l": {"c": "BTC-USD", "b": true, "px": 100000.0, "sz": 0.1, "tif": "GTC", "r": false}}],
        "nonce": 1704067200000,
        "account": "...",
        "signer": "...",
        "signature": "..."
      }
    },
    "id": 1
  }
  ```
  Conditional trading actions are available here as well:
  - `st` (stop), `tp` (take-profit), `rng` (range/OCO), `trig` (trigger basket), `trl` (trailing stop), `of` (on-fill consequents)
  - cancellation uses `cx` (single ID) or `cxa` (cancel-all), including conditional orders
  **Topic**: `post` (responses include `id` field matching request)
  **Response Format**:

  **Order Placed and Resting:**
  ```json
  {
    "type": "post",
    "id": 1,
    "data": {
      "type": "action",
      "payload": {
        "status": "ok",
        "response": {
          "type": "order",
          "data": {
            "statuses": [{"resting": {"oid": "Fpa3oVuL3UzjNANAMZZdmrn6D1Zhk83GmBuJpuAWG51F"}}]
          }
        }
      }
    }
  }
  ```

  **Order Filled Immediately:**
  ```json
  {
    "type": "post",
    "id": 1,
    "data": {
      "type": "action",
      "payload": {
        "status": "ok",
        "response": {
          "type": "order",
          "data": {
            "statuses": [{"filled": {"oid": "Fpa3oVuL3UzjNANAMZZdmrn6D1Zhk83GmBuJpuAWG51F", "totalSz": 0.1, "avgPx": 102500.0}}]
          }
        }
      }
    }
  }
  ```

  **Order Partially Filled:**
  ```json
  {
    "type": "post",
    "id": 1,
    "data": {
      "type": "action",
      "payload": {
        "status": "ok",
        "response": {
          "type": "order",
          "data": {
            "statuses": [{"partiallyFilled": {"oid": "Fpa3oVuL3UzjNANAMZZdmrn6D1Zhk83GmBuJpuAWG51F", "totalSz": 0.05, "avgPx": 102500.0}}]
          }
        }
      }
    }
  }
  ```

  **Order Error:**
  ```json
  {
    "type": "post",
    "id": 1,
    "data": {
      "type": "action",
      "payload": {
        "status": "ok",
        "response": {
          "type": "order",
          "data": {
            "statuses": [{"error": {"message": "Insufficient margin"}}]
          }
        }
      }
    }
  }
  ```

  **Authentication Reject (bad signature / unauthorized signer):**
  ```json
  {
    "type": "post",
    "id": 1,
    "data": {
      "type": "action",
      "payload": {
        "status": "error",
        "response": {
          "type": "order",
          "data": {
            "statuses": [{"error": {"message": "bad signature"}}]
          }
        }
      }
    }
  }
  ```
  `message` can be:
  - `"bad signature"`
  - `"unauthorized signer"`

  **Status Types (HTTP/WebSocket POST responses):**
  - `resting`: Order placed and resting on book - `{oid: string}`
  - `working`: Order resting with partial fills - `{oid: string, filledSz: number, remainingSz: number, vwap: number}`
  - `filled`: Order fully filled - `{oid: string, totalSz: number, avgPx: number}`
  - `partiallyFilled`: Order partially filled and terminal - `{oid: string, totalSz: number, avgPx: number}`
  - `cancelled`: Order cancelled by user - `{oid: string}`
  - `cancelledRiskLimit`: Cancelled due to risk limit - `{oid: string, reason?: string}`
  - `cancelledSelfCrossing`: Cancelled due to self-crossing - `{oid: string}`
  - `cancelledReduceOnly`: Cancelled - would not reduce position - `{oid: string}`
  - `cancelledIoc`: IOC expired without full fill - `{oid: string, filledSz: number}`
  - `rejectedCrossing`: Post-only rejected for crossing - `{oid: string}`
  - `rejectedDuplicate`: Duplicate order ID - `{oid: string}`
  - `rejectedRiskLimit`: Rejected due to risk limit - `{oid: string, reason?: string}`
  - `rejectedInvalid`: Invalid order parameters - `{oid: string, reason?: string}`
  - `triggered`: Conditional root fired - `{oid: string}`
  - `siblingCancelled`: OCO sibling auto-cancelled - `{oid: string, reason?: string}`
  - `triggerFailed`: Trigger execution failed - `{oid: string, reason?: string}`
  - `error`: Generic error - `{message: string}`

  The `payload` field contains the same `OrderResponse` structure as the HTTP `/order` endpoint.

  ## Unsubscribe

  ```json
  {
    "method": "unsubscribe",
    "subscription_id": 123
  }
  ```

  ## Multiple Subscriptions

  ```json
  {
    "method": "subscribe",
    "subscription": [
      {"type": "ticker", "symbol": "BTC-USD"},
      {"type": "trades", "symbol": "BTC-USD"},
      {"type": "risk", "symbol": "BTC-USD"},
      {"type": "candle", "symbol": "BTC-USD", "interval": "1m"},
      {"type": "account", "user": "FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7"},
      {"type": "account", "user": ["FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7", "5Am6JkEHAjYG1itNWRMGpQrxvY8AaqkXCo1TZvenqVux"]}
    ]
  }
  ```
  **Response**:
  ```json
  {
    "type": "subscriptionResponse",
    "topics": [
      "ticker.BTC-USD",
      "trades.BTC-USD",
      "risk.BTC-USD",
      "candle.BTC-USD.1m",
      "account.FuueqefENiGEW6uMqZQgmwjzgpnb85EgUcZa5Em4PQh7"
    ]
  }
  ```
