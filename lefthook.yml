# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
  commands:
    fmt:
      glob: "*.{ts,js,json,md}"
      run: deno fmt --config deno.json {staged_files}
      stage_fixed: true
    lint:
      glob: "*.{ts,js}"
      run: deno lint {staged_files}

pre-push:
  parallel: true
  commands:
    lint:
      run: deno task lint
    check:
      run: deno task check
    test:
      run: deno task test
